name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22.16.0", "24.2.0"]
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      # Dogfood: run ArcBridge's own drift check against its committed
      # .arcbridge/ model. Reindexes the monorepo and fails on error-severity
      # drift (e.g. an undeclared cross-block dependency or undocumented module).
      - run: node packages/cli/dist/index.js drift --reindex
